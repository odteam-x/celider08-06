<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Comisiones oficiales CELIDER 08-06 · UIT · OTAN · UNESCO" />
  <meta name="theme-color" content="#030A16" />
  <title>Comisiones · CELIDER 08-06</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body data-page="comisiones">

  <header class="site-header visible">
    <div class="header-inner">
      <div class="header-logo-wrap">
        <img src="logo.png" alt="CELIDER" class="header-logo"
          onerror="this.style.display='none';document.querySelector('.header-divider').style.display='none';" />
      </div>
      <div class="header-divider" aria-hidden="true"></div>
      <div class="header-titles">
        <h1>CELIDER 08-06</h1>
        <span>Comisiones</span>
      </div>
      <nav class="header-nav">
        <a href="index.html"     class="nav-link"><i class="fas fa-home"></i> Inicio</a>
        <a href="comisiones.html" class="nav-link active"><i class="fas fa-flag"></i> Comisiones</a>
        <a href="talleres.html"  class="nav-link"><i class="fas fa-chalkboard-teacher"></i> Talleres</a>
      </nav>
      <button class="btn-theme-toggle" id="themeToggle" aria-label="Cambiar tema" title="Modo claro / oscuro">
        <i class="fas fa-sun theme-icon-light" aria-hidden="true"></i>
        <i class="fas fa-moon theme-icon-dark" aria-hidden="true"></i>
        <span class="theme-toggle-label theme-label-light">Claro</span>
        <span class="theme-toggle-label theme-label-dark">Oscuro</span>
      </button>
      <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menú" aria-expanded="false" aria-controls="mobileNav">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-nav" id="mobileNav">
      <div class="mobile-nav-inner">
        <a href="index.html"      class="nav-link"><i class="fas fa-home"></i> Inicio</a>
        <a href="comisiones.html" class="nav-link active"><i class="fas fa-flag"></i> Comisiones</a>
        <a href="talleres.html"   class="nav-link"><i class="fas fa-chalkboard-teacher"></i> Talleres</a>
      </div>
    </nav>
  </header>

  <main class="main-content">

    <section class="page-hero">
      <h2>Comisiones</h2>
      <p>Consulta los delegados y sus países representados en cada comisión.</p>
    </section>

    <!-- Tab selector -->
    <div class="com-tabs" id="comTabs" role="tablist" aria-label="Seleccionar comisión"></div>

    <!-- Loading -->
    <div id="comLoading" class="loading-state visible">
      <div class="spinner"></div><p>Cargando comisiones…</p>
    </div>

    <!-- Commission panels (generated by JS) -->
    <div id="comPanels"></div>

  </main>

  <footer class="site-footer">
    <p>CELIDER 08-06 &mdash; República Dominicana &copy; 2026</p>
    <p class="footer-sub">Comisiones UIT · OTAN · UNESCO</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
